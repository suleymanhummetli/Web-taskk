<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberAuth — Giriş Sistemi</title>

    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />

    <style>
            /* ============================================================
           CSS DEĞİŞKƏNLƏRİ — Bütün rənglər buradan idarə olunur
        ============================================================ */
            :root {
                --bg-dark: #020c0a; /* Əsas fon — demək olar ki qara */
                --bg-panel: #040f0d; /* Kart/panel fonu */
                --green: #00ff88; /* Əsas yaşıl — terminal rəngi */
                --green-dim: #00cc6a; /* Söndürülmüş yaşıl */
                --green-glow: rgba(0,255,136,.25); /* Parıltı effekti */
                --red: #ff3c5a; /* Xəta/təhlükə rəngi */
                --border: rgba(0,255,136,.2); /* Kənar xətti */
                --text-dim: rgba(0,255,136,.5); /* Solğun mətn */
                --font-mono: 'Share Tech Mono', monospace;
                --font-head: 'Orbitron', sans-serif;
            }

            /* ============================================================
           ÜMUMI SIFIRLAMALAR
        ============================================================ */
            *, *::before, *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background-color: var(--bg-dark);
                color: var(--green);
                font-family: var(--font-mono);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                position: relative;
            }

            /* ============================================================
           ARXA FONDA SÜRÜŞƏN RƏQƏMLƏR (Matrix effekti)
           — Sadə CSS animasiyası ilə yaradılıb
        ============================================================ */
            .matrix-bg {
                position: fixed;
                inset: 0;
                overflow: hidden;
                z-index: 0;
                pointer-events: none;
            }

            .matrix-col {
                position: absolute;
                top: -100%;
                font-size: 14px;
                color: rgba(0,255,136,.12);
                animation: fall linear infinite;
                white-space: nowrap;
                writing-mode: vertical-rl;
                letter-spacing: 4px;
            }

            @keyframes fall {
                to {
                    top: 110%;
                }
            }

            /* ============================================================
           ƏSAS KONTEYNER
        ============================================================ */
            .container {
                position: relative;
                z-index: 10;
                width: 100%;
                max-width: 440px;
                padding: 16px;
            }

            /* ============================================================
           BAŞLIQ
        ============================================================ */
            .header {
                text-align: center;
                margin-bottom: 28px;
            }

                .header .logo {
                    font-family: var(--font-head);
                    font-size: 2rem;
                    font-weight: 900;
                    letter-spacing: 6px;
                    text-shadow: 0 0 20px var(--green), 0 0 40px var(--green-dim);
                    animation: pulse 2s ease-in-out infinite;
                }

            @keyframes pulse {
                0%,100% {
                    text-shadow: 0 0 20px var(--green), 0 0 40px var(--green-dim);
                }

                50% {
                    text-shadow: 0 0 40px var(--green), 0 0 80px var(--green-dim);
                }
            }

            .header .tagline {
                font-size: .75rem;
                color: var(--text-dim);
                letter-spacing: 4px;
                margin-top: 6px;
            }

            /* ============================================================
           SEKMƏLƏRİ (LOGIN / REGISTER seçimi)
        ============================================================ */
            .tabs {
                display: flex;
                border: 1px solid var(--border);
                border-radius: 4px;
                overflow: hidden;
                margin-bottom: 24px;
            }

            .tab-btn {
                flex: 1;
                padding: 12px;
                background: transparent;
                border: none;
                color: var(--text-dim);
                font-family: var(--font-mono);
                font-size: .85rem;
                letter-spacing: 3px;
                cursor: pointer;
                transition: all .3s;
                text-transform: uppercase;
            }

                .tab-btn.active {
                    background: var(--green-glow);
                    color: var(--green);
                    text-shadow: 0 0 8px var(--green);
                }

                .tab-btn:hover:not(.active) {
                    color: var(--green-dim);
                    background: rgba(0,255,136,.05);
                }

            /* ============================================================
           KART / PANEL
        ============================================================ */
            .card {
                background: var(--bg-panel);
                border: 1px solid var(--border);
                border-radius: 6px;
                padding: 32px;
                box-shadow: 0 0 40px var(--green-glow), inset 0 0 30px rgba(0,0,0,.5);
                position: relative;
            }
                /* Köşe dekorasyonları */
                .card::before, .card::after {
                    content: '';
                    position: absolute;
                    width: 12px;
                    height: 12px;
                    border-color: var(--green);
                    border-style: solid;
                }

                .card::before {
                    top: -1px;
                    left: -1px;
                    border-width: 2px 0 0 2px;
                }

                .card::after {
                    bottom: -1px;
                    right: -1px;
                    border-width: 0 2px 2px 0;
                }

            /* ============================================================
           FORM GİZLƏTMƏ / GÖSTƏRMƏ
        ============================================================ */
            .form-panel {
                display: none;
            }

                .form-panel.active {
                    display: block;
                }

            /* ============================================================
           FORM ELEMENTLƏRI
        ============================================================ */
            .field {
                margin-bottom: 20px;
            }

                .field label {
                    display: block;
                    font-size: .7rem;
                    letter-spacing: 3px;
                    color: var(--text-dim);
                    margin-bottom: 8px;
                    text-transform: uppercase;
                }

            .field-wrap {
                position: relative;
            }
                /* Sol ikona xətti */
                .field-wrap .prefix {
                    position: absolute;
                    left: 12px;
                    top: 50%;
                    transform: translateY(-50%);
                    color: var(--green-dim);
                    font-size: .85rem;
                    pointer-events: none;
                }

            .field input {
                width: 100%;
                background: rgba(0,255,136,.03);
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 12px 12px 12px 36px;
                color: var(--green);
                font-family: var(--font-mono);
                font-size: .9rem;
                outline: none;
                transition: border-color .3s, box-shadow .3s;
            }

                .field input::placeholder {
                    color: rgba(0,255,136,.2);
                }

                .field input:focus {
                    border-color: var(--green);
                    box-shadow: 0 0 12px var(--green-glow);
                }

            /* ============================================================
           DÜYMƏ
        ============================================================ */
            .btn {
                width: 100%;
                padding: 14px;
                background: transparent;
                border: 1px solid var(--green);
                border-radius: 4px;
                color: var(--green);
                font-family: var(--font-head);
                font-size: .8rem;
                font-weight: 700;
                letter-spacing: 4px;
                text-transform: uppercase;
                cursor: pointer;
                position: relative;
                overflow: hidden;
                transition: all .3s;
                margin-top: 8px;
            }
                /* Hover effekti — sol tərəfdən dolur */
                .btn::before {
                    content: '';
                    position: absolute;
                    inset: 0;
                    background: var(--green);
                    transform: translateX(-100%);
                    transition: transform .3s;
                    z-index: 0;
                }

                .btn:hover::before {
                    transform: translateX(0);
                }

                .btn:hover {
                    color: var(--bg-dark);
                    box-shadow: 0 0 20px var(--green-glow);
                }

                .btn span {
                    position: relative;
                    z-index: 1;
                }

            /* ============================================================
           MESAJ QUTUSU (uğur / xəta bildirişləri)
        ============================================================ */
            .msg {
                margin-top: 16px;
                padding: 10px 14px;
                border-radius: 4px;
                font-size: .8rem;
                letter-spacing: 1px;
                display: none;
                border-left: 3px solid;
            }

                .msg.success {
                    background: rgba(0,255,136,.08);
                    border-color: var(--green);
                    color: var(--green);
                    display: block;
                }

                .msg.error {
                    background: rgba(255,60,90,.08);
                    border-color: var(--red);
                    color: var(--red);
                    display: block;
                }

            /* ============================================================
           ALT XƏTTİ / STATUS BAR
        ============================================================ */
            .status-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 20px;
                padding-top: 16px;
                border-top: 1px solid var(--border);
                font-size: .65rem;
                color: var(--text-dim);
                letter-spacing: 2px;
            }

            .status-dot {
                display: inline-block;
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--green);
                margin-right: 6px;
                animation: blink 1s step-end infinite;
            }

            @keyframes blink {
                0%,100% {
                    opacity: 1
                }

                50% {
                    opacity: 0
                }
            }

            /* ============================================================
           SCAN XƏTT EFFEKTİ (kartın üzərindən keçən işıq)
        ============================================================ */
            .scan-line {
                position: absolute;
                left: 0;
                right: 0;
                height: 2px;
                background: linear-gradient(90deg, transparent, var(--green), transparent);
                opacity: .3;
                animation: scan 4s linear infinite;
                pointer-events: none;
                border-radius: 6px;
            }

            @keyframes scan {
                0% {
                    top: 0;
                }

                100% {
                    top: 100%;
                }
            }
    </style>
</head>
<body>

    <div class="matrix-bg" id="matrixBg"></div>

    <div class="container">

        <div class="header">
            <div class="logo">CYBER<span style="color:#fff">AUTH</span></div>
            <div class="tagline">// GİRİŞ SİSTEMİ — v2.0.4</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">&#x25B6; Giriş</button>
            <button class="tab-btn" onclick="switchTab('register')">&#x2B; Qeydiyyat</button>
        </div>

        <div class="card">
            <div class="scan-line"></div><div class="form-panel active" id="loginPanel">

                <form action="secure_server.php" method="POST" id="loginForm">
                    <input type="hidden" name="action" value="login" />

                    <div class="field">
                        <label>// İstifadəçi adı</label>
                        <div class="field-wrap">
                            <span class="prefix">&#x25B6;</span>
                            <input type="text" name="username" placeholder="identifikator daxil edin" required />
                        </div>
                    </div>

                    <div class="field">
                        <label>// Şifrə (Maks 15 simvol)</label>
                        <div class="field-wrap">
                            <span class="prefix">&#x25A0;</span>
                            <input type="password" name="password" placeholder="şifrəni daxil edin" maxlength="15" required />
                        </div>
                    </div>

                    <button type="submit" class="btn"><span>[ SİSTEMƏ DAXİL OL ]</span></button>
                </form>

            </div><div class="form-panel" id="registerPanel">

                <form action="vulnerable_server.php" method="POST" id="registerForm">
                    <input type="hidden" name="action" value="register" />

                    <div class="field">
                        <label>// İstifadəçi adı</label>
                        <div class="field-wrap">
                            <span class="prefix">&#x25B6;</span>
                            <input type="text" name="username" placeholder="unikal ad seçin" required />
                        </div>
                    </div>

                    <div class="field">
                        <label>// E-poçt</label>
                        <div class="field-wrap">
                            <span class="prefix">@</span>
                            <input type="email" name="email" placeholder="e-poçt ünvanınız" required />
                        </div>
                    </div>

                    <div class="field">
                        <label>// Şifrə (Maks 15 simvol)</label>
                        <div class="field-wrap">
                            <span class="prefix">&#x25A0;</span>
                            <input type="password" name="password" placeholder="güclü şifrə yaradın" maxlength="15" required />
                        </div>
                    </div>

                    <button type="submit" class="btn"><span>[ HESAB YARAT ]</span></button>
                </form>

            </div><div class="status-bar">
                <span><span class="status-dot"></span>SİSTEM AKTİVDİR</span>
                <span>ENC: AES-256</span>
                <span id="clock"></span>
            </div>

        </div>
    </div>
    <script>
        // ============================================================
        // SEKMƏ DEYİŞDİRMƏ FUNKSİYASI
        // Login və Register formlarını göstərir/gizlədir
        // ============================================================
        function switchTab(tab) {
            document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(tab + 'Panel').classList.add('active');

            if (event && event.target) {
                event.target.classList.add('active');
            }
        }

        // ============================================================
        // REAL-VAXT SAAT
        // Status bar-da göstərilir
        // ============================================================
        function updateClock() {
            const now = new Date();
            const clockEl = document.getElementById('clock');
            if (clockEl) {
                clockEl.textContent = now.toLocaleTimeString('az-AZ', { hour12: false });
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ============================================================
        // MATRİX ARXA FONU
        // Random rəqəm sütunları yaradır
        // ============================================================
        (function createMatrix() {
            const bg = document.getElementById('matrixBg');
            const chars = '01アイウエオカキクケコサシスセソ'; // ASCII + Katakana

            for (let i = 0; i < 30; i++) {
                const col = document.createElement('div');
                col.className = 'matrix-col';

                let text = '';
                for (let j = 0; j < 40; j++) {
                    text += chars[Math.floor(Math.random() * chars.length)] + '\n';
                }
                col.textContent = text;

                col.style.left = Math.random() * 100 + '%';
                col.style.animationDuration = (6 + Math.random() * 14) + 's';
                col.style.animationDelay = (-Math.random() * 20) + 's';
                col.style.fontSize = (10 + Math.random() * 6) + 'px';
                col.style.opacity = (0.05 + Math.random() * 0.1).toString();

                bg.appendChild(col);
            }
        })();
    </script>

</body>
</html>
