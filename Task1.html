<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>697.24</title>

    <style>
        body {
            background-color: #e0e7ff; /* Arxa fon rəngi */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .konteyner {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }

        h1 {
            color: #4f46e5;
            margin-bottom: 10px;
        }

        p {
            color: #4b5563;
            line-height: 1.6;
        }

        .duyme {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #4f46e5;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

            .duyme:hover {
                background-color: #4338ca;
            }
    </style>
</head>
<body>

    <div class="konteyner">
        <h1>I'am HUMMATLI SULEYMAN!</h1>
        <p>NOTHING</p>
        <a href="#" class="duyme">Let's do it</a>
    </div>
